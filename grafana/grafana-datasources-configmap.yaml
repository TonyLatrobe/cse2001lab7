apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name:      Prometheus
        type:      prometheus
        uid:       prometheus
        url:       http://prometheus:9090
        access:    proxy
        isDefault: true
        editable:  true

      - name:    Loki
        type:    loki
        uid:     loki
        url:     http://loki:3100
        access:  proxy
        editable: true
        jsonData:
          derivedFields:
            - name:          pod
              matcherRegex:  "pod=([\\w-]+)"
              url:           "/explore?orgId=1&left=%7B%22datasource%22%3A%22prometheus%22%7D"
              datasourceUid: prometheus
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-html
  namespace: observability
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Demo App — Observability Lab</title>
        <style>
          body { font-family: monospace; padding: 2rem; background: #111; color: #0f0; }
          #log { margin-top: 1rem; font-size: 0.85rem; max-height: 300px; overflow-y: auto; }
          .ok  { color: #0f0; }
          .err { color: #f44; }
        </style>
    </head>
    <body>
        <h2>Demo App — Observability Lab</h2>
        <p>Generating traffic every <strong>5s</strong>. Watch Loki + Prometheus.</p>
        <div id="log"></div>
        <script>
          const log = document.getElementById('log');
          let tick = 0;

          function addEntry(msg, ok) {
            const line = document.createElement('div');
            line.className = ok ? 'ok' : 'err';
            line.textContent = `[${new Date().toISOString()}] ${msg}`;
            log.prepend(line);
            while (log.children.length > 50) log.removeChild(log.lastChild);
          }

          async function poll() {
            tick++;
            try {
              const r = await fetch('/');
              addEntry(`GET / → ${r.status}`, r.ok);
            } catch (e) {
              addEntry(`GET / → network error: ${e.message}`, false);
            }
            if (tick % 3 === 0) {
              try {
                const r = await fetch('/missing');
                addEntry(`GET /missing → ${r.status}`, r.ok);
              } catch (e) {
                addEntry(`GET /missing → network error: ${e.message}`, false);
              }
            }
          }

          poll();
          setInterval(poll, 5000);
        </script>
    </body>
    </html>

  default.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }

        location = /favicon.ico {
            return 204;
            access_log off;
            log_not_found off;
        }
    }
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: localhost:32000/nginx:stable
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: demo-app-html
              mountPath: /usr/share/nginx/html
            - name: demo-app-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args:
            - -nginx.scrape-uri=http://localhost/nginx_status
          ports:
            - containerPort: 9113

      volumes:
        - name: demo-app-html
          configMap:
            name: demo-app-html
            items:
              - key: index.html
                path: index.html

        - name: demo-app-conf
          configMap:
            name: demo-app-html
            items:
              - key: default.conf
                path: default.conf
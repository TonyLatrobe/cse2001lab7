apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yaml

    scrape_configs:

      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Jenkins — prometheus plugin baked into jenkins-secops:lab
      - job_name: 'jenkins'
        metrics_path: /prometheus
        static_configs:
          - targets: ['jenkins:8080']

      # Loki — exposes ingester, distributor, query metrics
      - job_name: 'loki'
        static_configs:
          - targets: ['loki:3100']

      # Alloy — exposes component health, log pipeline metrics
      - job_name: 'alloy'
        static_configs:
          - targets: ['alloy:12345']

      # Demo app — nginx stub_status
      - job_name: 'demo-app'
        metrics_path: /nginx_status
        static_configs:
          - targets: ['demo-app:80']